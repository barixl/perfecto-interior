<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Access - Perfecto Interior</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/fontawesome.min.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }
        
        body {
            background-color: #0f172a;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            background-size: cover;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            overflow: hidden;
            position: relative;
            perspective: 1000px;
        }

        /* Animated background elements */
        .shape {
            position: absolute;
            filter: blur(80px);
            z-index: -1;
            animation: float 10s infinite alternate ease-in-out;
        }
        .shape-1 {
            width: 400px;
            height: 400px;
            background: #3b82f6;
            top: -100px;
            left: -100px;
            border-radius: 50%;
            opacity: 0.5;
        }
        .shape-2 {
            width: 500px;
            height: 500px;
            background: #ec4899;
            bottom: -150px;
            right: -100px;
            border-radius: 50%;
            opacity: 0.4;
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translateY(0) translateX(0) scale(1); }
            100% { transform: translateY(-50px) translateX(50px) scale(1.1); }
        }

        .login-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .login-card {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 48px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 420px;
            position: relative;
            overflow: hidden;
            transform-style: preserve-3d;
            transition: transform 0.1s;
        }

        /* Shine effect on card hover */
        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.05) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg);
            animation: shine 6s infinite;
        }

        @keyframes shine {
            0% { left: -100%; }
            20% { left: 200%; }
            100% { left: 200%; }
        }

        .brand-logo {
            text-align: center;
            margin-bottom: 10px;
            transform: translateZ(30px);
        }

        .brand-logo i {
            font-size: 40px;
            background: linear-gradient(135deg, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(96, 165, 250, 0.4));
        }

        .login-card h2 {
            text-align: center;
            margin-bottom: 35px;
            font-weight: 700;
            font-size: 28px;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #fff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transform: translateZ(20px);
        }

        .input-group {
            position: relative;
            margin-bottom: 25px;
            transform: translateZ(15px);
        }

        .input-group i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            transition: 0.3s;
            font-size: 18px;
            z-index: 2;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            border-radius: 12px;
            padding: 15px 15px 15px 45px;
            font-size: 15px;
            transition: all 0.3s ease;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.15);
            border-color: #60a5fa;
            outline: none;
        }

        .input-group:focus-within i {
            color: #60a5fa;
        }

        .form-control::placeholder {
            color: #64748b;
        }

        .btn-login {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 16px;
            width: 100%;
            font-weight: 600;
            font-size: 16px;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(96, 165, 250, 0.4);
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transform: translateZ(25px);
        }

        .btn-login:hover {
            transform: translateZ(30px) translateY(-2px);
            box-shadow: 0 8px 25px rgba(96, 165, 250, 0.6);
        }

        .btn-login:active {
            transform: translateZ(20px) translateY(1px);
        }

        .btn-login::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 150%;
            height: 150%;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 60%);
            transform: translate(-50%, -50%) scale(0);
            opacity: 0;
            transition: transform 0.5s, opacity 0.5s;
        }

        .btn-login:hover::after {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        .back-link {
            text-align: center;
            margin-top: 25px;
            transform: translateZ(10px);
        }

        .back-link a {
            color: #94a3b8;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .back-link a:hover {
            color: #fff;
            transform: translateX(-3px);
        }

        .alert {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            border-radius: 10px;
            padding: 12px 15px;
            font-size: 14px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
            transform: translateZ(15px);
        }
        .alert-success {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #86efac;
        }
        
        .btn-close {
            filter: invert(1) grayscale(100%) brightness(200%);
            opacity: 0.5;
            margin-left: auto;
            background: transparent;
            border: none;
            color: white;
            font-size: 1.2rem;
            line-height: 1;
            cursor: pointer;
        }
    </style>
</head>
<body>

<!-- Animated background shapes -->
<div class="shape shape-1"></div>
<div class="shape shape-2"></div>

<div class="login-wrapper">
    <div class="login-card" id="tilt-card">
        <div class="brand-logo">
            <i class="fa-solid fa-couch"></i>
        </div>
        <h2>Admin Portal</h2>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ 'success' if category == 'success' else 'danger' }} alert-dismissible fade show" role="alert">
                        <i class="fa-solid fa-{{ 'check-circle' if category == 'success' else 'triangle-exclamation' }}"></i>
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close">
                            <span aria-hidden="true">&times;</span>
                        </button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('admin_login') }}" method="POST">
            <div class="input-group">
                <i class="fa-solid fa-user"></i>
                <input type="text" class="form-control" id="username" name="username" placeholder="Username" required>
            </div>
            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
            </div>
            <button type="submit" class="btn-login">
                <span>Sign In</span>
                <i class="fa-solid fa-arrow-right-to-bracket"></i>
            </button>
        </form>
        <div class="back-link">
            <a href="{{ url_for('index') }}">
                <i class="fa-solid fa-arrow-left"></i> Return to Website
            </a>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='js/bootstrap.min.js') }}"></script>
<script>
    // Add subtle 3D interactive tilt effect to card
    const card = document.getElementById('tilt-card');
    
    document.addEventListener('mousemove', (e) => {
        // Calculate mouse position relative to center of screen
        const xAxis = (window.innerWidth / 2 - e.pageX) / 40;
        const yAxis = (window.innerHeight / 2 - e.pageY) / 40;
        
        // Apply transform with smooth rotation
        card.style.transform = `rotateY(${-xAxis}deg) rotateX(${yAxis}deg)`;
    });
    
    // Smooth reset on mouse leave
    document.addEventListener('mouseleave', () => {
        card.style.transform = 'rotateY(0deg) rotateX(0deg)';
        card.style.transition = 'transform 0.5s ease-out';
    });
    
    // Remove transition when hovering for snappier tracking
    document.addEventListener('mouseenter', () => {
        card.style.transition = 'transform 0.1s ease-out';
    });
</script>
</body>
</html>
